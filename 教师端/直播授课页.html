<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播课堂</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #1e1e2e; color: #fff; font-size: 13px; overflow: hidden; height: 100vh; }

/* Layout */
.live-room { display: flex; flex-direction: column; height: 100vh; }
.live-header {
  height: 56px;
  background: #1e1e2e;
  border-bottom: 1px solid #2d2d44;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  flex-shrink: 0;
}
.live-body { display: flex; flex: 1; overflow: hidden; }
.live-footer {
  height: 48px;
  background: #1e1e2e;
  border-top: 1px solid #2d2d44;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  flex-shrink: 0;
}

/* Header left */
.header-left { display: flex; align-items: center; gap: 10px; }
.header-logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #4a8eff, #2563eb);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #fff;
}
.header-class { font-size: 14px; color: #fff; font-weight: 500; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.header-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: #9ca3af; cursor: pointer; font-size: 16px; }
.header-icon:hover { color: #fff; }

/* Header center */
.header-center { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #9ca3af; }
.header-status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }
.header-status-text { color: #fff; font-weight: 500; }

/* Header right */
.header-right { display: flex; align-items: center; gap: 4px; }
.header-tool {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 4px 10px; border-radius: 6px; cursor: pointer;
  color: #9ca3af; font-size: 11px; transition: all .15s;
}
.header-tool:hover { background: #2d2d44; color: #fff; }
.header-tool .icon { font-size: 18px; }
.header-tool.end-class {
  background: #f97316; color: #fff; padding: 6px 16px; font-size: 13px; font-weight: 600;
  flex-direction: row; gap: 6px;
}
.header-tool.end-class:hover { background: #ea580c; }

/* Left sidebar */
.left-sidebar {
  width: 56px;
  background: #1e1e2e;
  border-right: 1px solid #2d2d44;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 10px 0;
  gap: 8px;
  flex-shrink: 0;
}
.sidebar-btn {
  width: 44px;
  padding: 8px 2px;
  border-radius: 8px;
  border: 1px solid #3d3d5c;
  background: transparent;
  color: #9ca3af;
  font-size: 11px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  line-height: 1.2;
  text-align: center;
}
.sidebar-btn:hover { background: #2d2d44; color: #fff; }
.sidebar-btn .icon { font-size: 16px; }

/* AI Board Panel */
.ai-board-panel {
  position: absolute;
  top: 10px; left: 66px; right: 10px; bottom: 10px;
  background: #2a2a3e;
  border-radius: 12px;
  border: 1px solid #3d3d5c;
  display: none;
  flex-direction: column;
  overflow: hidden;
  z-index: 100;
}
.ai-board-panel.open { display: flex; }
.ai-board-header {
  height: 44px;
  background: #1e1e2e;
  border-bottom: 1px solid #3d3d5c;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  flex-shrink: 0;
}
.ai-board-title { font-size: 14px; font-weight: 600; color: #fff; }
.ai-board-close {
  width: 28px; height: 28px;
  background: none; border: none;
  color: #9ca3af; font-size: 18px;
  cursor: pointer; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
.ai-board-close:hover { background: #3d3d5c; color: #fff; }
.ai-board-body {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #dcb35c;
  cursor: grab;
}
.ai-board-body:active { cursor: grabbing; }
.ai-board-canvas {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.ai-board-toolbar {
  height: 48px;
  background: #1e1e2e;
  border-top: 1px solid #3d3d5c;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 14px;
  flex-shrink: 0;
}
.board-tool-btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid #3d3d5c;
  background: #2d2d44;
  color: #9ca3af;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}
.board-tool-btn:hover { background: #3d3d5c; color: #fff; }
.board-tool-btn.active {
  background: #2563eb;
  color: #fff;
  border-color: #2563eb;
}
.board-tool-btn .stone-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.3);
}
.board-tool-btn .stone-dot.black { background: #1a1a1a; }
.board-tool-btn .stone-dot.white { background: #f5f5f5; }
.board-tool-btn .stone-dot.auto {
  position: relative; overflow: hidden;
  background: #f5f5f5; border-color: rgba(0,0,0,0.4);
}
.board-tool-btn .stone-dot.auto::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 50%; height: 100%; background: #1a1a1a;
  border-radius: 6px 0 0 6px;
}
.board-size-select {
  padding: 6px 10px; border-radius: 6px;
  border: 1px solid #3d3d5c; background: #2d2d44;
  color: #9ca3af; font-size: 12px; outline: none; cursor: pointer;
}
.board-size-select:hover { background: #3d3d5c; color: #fff; }
.board-zoom-info {

  margin-left: 8px;
}

/* Main content */
.main-content { flex: 1; display: flex; overflow: hidden; position: relative; }
.whiteboard {

  background: #fff;

}
.whiteboard-cursor {

  width: 6px; height: 6px;
  background: #ef4444;
  border-radius: 50%;

}

/* Whiteboard toolbar (right side of whiteboard) */
.wb-toolbar {

.wb-tool {

.wb-tool:hover { background: #2d2d44; color: #fff; }
.wb-tool.active { background: #2563eb; color: #fff; }
.wb-tool-divider { width: 20px; height: 1px; background: #3d3d5c; margin: 4px 0; }

/* Right panel */

.video-tag {

/* Chat area */

/* Footer */

<script>
// Class timer
var seconds = 8 * 60 + 7;
function updateTimer() {
  var h = Math.floor(seconds / 3600);
  var m = Math.floor((seconds % 3600) / 60);
  var s = seconds % 60;
  var text = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  document.getElementById('class-timer').textContent = text;
}
setInterval(function() {
  seconds++;
  updateTimer();
}, 1000);

function endClass() {
  if (confirm('确认下课？')) {
    alert('课程已结束');
  }
}

// ====== AI 挂盘功能 ======
var boardSize = 19;
var stoneRadius = 16;
var gridMargin = 36;
var canvasSize = 760;
var cellSize = (canvasSize - 2 * gridMargin) / (boardSize - 1);

var stones = [];
var stoneMode = 'black'; // 'black' | 'white' | 'auto'
var autoStartColor = 'black'; // effective when stoneMode === 'auto'
var showNumbers = true;
var boardScale = 1.0;
var boardOffsetX = 0;
var boardOffsetY = 0;
var isDraggingBoard = false;
var dragStartX = 0;
var dragStartY = 0;
var boardDragStartOffsetX = 0;
var boardDragStartOffsetY = 0;

var canvas, ctx, boardBody;

function initAIBoard() {
  canvas = document.getElementById('goBoardCanvas');
  ctx = canvas.getContext('2d');
  boardBody = document.getElementById('aiBoardBody');
  resizeCanvas();
  drawBoard();

  canvas.addEventListener('mousedown', onBoardMouseDown);
  canvas.addEventListener('mousemove', onBoardMouseMove);
  canvas.addEventListener('mouseup', onBoardMouseUp);
  canvas.addEventListener('wheel', onBoardWheel, { passive: false });
  boardBody.addEventListener('mousedown', onBodyMouseDown);
  boardBody.addEventListener('mousemove', onBodyMouseMove);
  boardBody.addEventListener('mouseup', onBodyMouseUp);
  window.addEventListener('resize', function() {
    resizeCanvas();
    drawBoard();
  });
}

function resizeCanvas() {
  var w = boardBody.clientWidth;
  var h = boardBody.clientHeight;
  var size = Math.min(w, h) - 40;
  size = Math.max(size, 400);
  canvasSize = size;
  canvas.width = canvasSize;
  canvas.height = canvasSize;
  canvas.style.width = canvasSize + 'px';
  canvas.style.height = canvasSize + 'px';
  cellSize = (canvasSize - 2 * gridMargin) / (boardSize - 1);
  stoneRadius = cellSize * 0.42;
}

function drawBoard() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.scale(boardScale, boardScale);
  ctx.translate(-canvas.width / 2 + boardOffsetX, -canvas.height / 2 + boardOffsetY);

  // Board background
  ctx.fillStyle = '#dcb35c';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = '#5c3d1e';
  ctx.lineWidth = 1;
  for (var i = 0; i < boardSize; i++) {
    var pos = gridMargin + i * cellSize;
    ctx.beginPath();
    ctx.moveTo(gridMargin, pos);
    ctx.lineTo(canvasSize - gridMargin, pos);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos, gridMargin);
    ctx.lineTo(pos, canvasSize - gridMargin);
    ctx.stroke();
  }

  // Star points (hoshi)
  var starPoints = getStarPoints(boardSize);
  ctx.fillStyle = '#5c3d1e';
  for (var r = 0; r < starPoints.length; r++) {
    for (var c = 0; c < starPoints.length; c++) {
      var sx = gridMargin + starPoints[c] * cellSize;
      var sy = gridMargin + starPoints[r] * cellSize;
      ctx.beginPath();
      ctx.arc(sx, sy, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Stones
  for (var i = 0; i < stones.length; i++) {
    drawStone(stones[i]);
  }

  ctx.restore();
}

function drawStone(stone) {
  var gx = stone.x, gy = stone.y, color = stone.color;
  var x = gridMargin + gx * cellSize;
  var y = gridMargin + gy * cellSize;
  var r = stoneRadius;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  if (color === 'black') {
    var grad = ctx.createRadialGradient(x - r * 0.25, y - r * 0.25, r * 0.1, x, y, r);
    grad.addColorStop(0, '#555');
    grad.addColorStop(0.3, '#222');
    grad.addColorStop(1, '#000');
    ctx.fillStyle = grad;
    ctx.fill();
  } else {
    var grad = ctx.createRadialGradient(x - r * 0.25, y - r * 0.25, r * 0.1, x, y, r);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.7, '#eee');
    grad.addColorStop(1, '#ccc');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  if (stone.step && showNumbers) {
    ctx.font = 'bold ' + Math.max(10, Math.floor(r * 0.85)) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = color === 'black' ? '#fff' : '#1a1a1a';
    ctx.fillText(String(stone.step), x, y + 1);
  }
}

function getGridFromEvent(e) {
  var rect = canvas.getBoundingClientRect();
  var mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  var my = (e.clientY - rect.top) * (canvas.height / rect.height);
  var cx = canvas.width / 2;
  var cy = canvas.height / 2;
  mx = (mx - cx) / boardScale + cx - boardOffsetX;
  my = (my - cy) / boardScale + cy - boardOffsetY;
  var gx = Math.round((mx - gridMargin) / cellSize);
  var gy = Math.round((my - gridMargin) / cellSize);
  if (gx >= 0 && gx < boardSize && gy >= 0 && gy < boardSize) {
    return { x: gx, y: gy };
  }
  return null;
}

function onBoardMouseDown(e) {
  if (e.button !== 0) return;
  if (isDraggingBoard) return;
  var pos = getGridFromEvent(e);
  if (pos) {
    placeStone(pos.x, pos.y);
  }
}

function onBoardMouseMove(e) { }
function onBoardMouseUp(e) { }

function onBodyMouseDown(e) {
  if (e.target !== canvas && e.target !== boardBody) return;
  if (e.button !== 0) return;
  isDraggingBoard = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  boardDragStartOffsetX = boardOffsetX;
  boardDragStartOffsetY = boardOffsetY;
  boardBody.style.cursor = 'grabbing';
}

function onBodyMouseMove(e) {
  if (!isDraggingBoard) return;
  boardOffsetX = boardDragStartOffsetX + (e.clientX - dragStartX) / boardScale;
  boardOffsetY = boardDragStartOffsetY + (e.clientY - dragStartY) / boardScale;
  drawBoard();
}

function onBodyMouseUp(e) {
  isDraggingBoard = false;
  boardBody.style.cursor = 'grab';
}

function onBoardWheel(e) {
  e.preventDefault();
  var delta = e.deltaY > 0 ? -0.05 : 0.05;
  zoomBoard(delta);
}

function getMoveColor() {
  if (stoneMode === 'black') return 'black';
  if (stoneMode === 'white') return 'white';
  var step = stones.length + 1;
  if (stoneMode === 'auto') {
    return step % 2 === 1 ? autoStartColor : (autoStartColor === 'black' ? 'white' : 'black');
  }
  return 'black';
}

function placeStone(gx, gy) {
  for (var i = 0; i < stones.length; i++) {
    if (stones[i].x === gx && stones[i].y === gy) return;
  }
  var color = getMoveColor();
  stones.push({ x: gx, y: gy, color: color, step: stones.length + 1 });
  drawBoard();
}

function updateToolbarUI() {
  document.getElementById('btnBlack').classList.toggle('active', stoneMode === 'black');
  document.getElementById('btnWhite').classList.toggle('active', stoneMode === 'white');
  document.getElementById('btnAuto').classList.toggle('active', stoneMode === 'auto');
  document.getElementById('btnAutoText').textContent =
    autoStartColor === 'black' ? '自动(黑先)' : '自动(白先)';
  document.getElementById('btnNumbers').classList.toggle('active', showNumbers);
}

function toggleShowNumbers() {
  showNumbers = !showNumbers;
  updateToolbarUI();
  drawBoard();
}

function setStoneMode(mode) {
  stoneMode = mode;
  updateToolbarUI();
}

function toggleAutoMode() {
  if (stoneMode !== 'auto') {
    stoneMode = 'auto';
  } else {
    autoStartColor = autoStartColor === 'black' ? 'white' : 'black';
  }
  updateToolbarUI();
}

function changeBoardSize(size) {
  size = parseInt(size, 10);
  if (isNaN(size) || size < 2) return;
  boardSize = size;
  stones = [];
  boardScale = 1.0;
  boardOffsetX = 0;
  boardOffsetY = 0;
  document.getElementById('zoomInfo').textContent = '100%';
  resizeCanvas();
  drawBoard();
}

function getStarPoints(size) {
  if (size === 19) return [3, 9, 15];
  if (size === 13) return [3, 6, 9];
  if (size === 9) return [2, 4, 6];
  if (size === 7) return [2, 4];
  return [];
}

function undoMove() {
  if (stones.length > 0) {
    stones.pop();
    drawBoard();
  }
}

function clearBoard() {
  if (stones.length > 0 && confirm('确认清空棋盘？')) {
    stones = [];
    drawBoard();
  } else if (stones.length === 0) {
    stones = [];
    drawBoard();
  }
}

function zoomBoard(delta) {
  var newScale = boardScale + delta;
  if (newScale < 0.5) newScale = 0.5;
  if (newScale > 2.5) newScale = 2.5;
  boardScale = newScale;
  document.getElementById('zoomInfo').textContent = Math.round(boardScale * 100) + '%';
  drawBoard();
}

function toggleAIBoard() {
  var panel = document.getElementById('aiBoardPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    setTimeout(function() {
      resizeCanvas();
      drawBoard();
    }, 10);
  }
}

// Initialize
initAIBoard();
</script>

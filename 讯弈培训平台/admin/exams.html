<!DOCTYPE html>
<html lang="zh-CN" data-theme="edutech">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考试管理 - 代理商学习考核平台</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3B82F6',
            secondary: '#10B981',
            surface: '#F8FAFC',
            'primary-light': '#EBF4FF',
            'secondary-light': '#ECFDF5'
          },
          borderRadius: {
            '2xl': '12px'
          }
        }
      },
      daisyui: {
        themes: [{
          edutech: {
            primary: '#3B82F6',
            secondary: '#10B981',
            accent: '#3B82F6',
            neutral: '#1F2937',
            'base-100': '#F8FAFC',
            'base-200': '#F1F5F9',
            'base-300': '#E2E8F0',
            info: '#3B82F6',
            success: '#10B981',
            warning: '#F59E0B',
            error: '#EF4444'
          }
        }]
      }
    }
  </script>
  <link rel="stylesheet" href="../shared/css/common.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div class="admin-main">
      <div class="admin-content">
        <div class="admin-page-header">
          <h1 class="admin-page-title">考试管理</h1>
          <a href="exam-create.html" class="btn btn-primary"><i class="fa-solid fa-plus"></i>创建考试</a>
        </div>

        <div class="card">
          <div class="admin-toolbar">
            <div class="admin-toolbar-left">
              <select class="form-control" id="audienceFilter" style="width: 120px;">
                <option value="">全部受众</option>
                <option value="agent">代理商</option>
                <option value="employee">内部员工</option>
                <option value="all">全部</option>
              </select>
              <select class="form-control" id="statusFilter" style="width: 120px;">
                <option value="">全部状态</option>
                <option value="published">已发布</option>
                <option value="draft">草稿</option>
              </select>
            </div>
            <div class="admin-toolbar-right">
              <input type="text" class="form-control admin-search" id="searchInput" placeholder="搜索考试名称">
            </div>
          </div>

          <div class="table-wrap">
            <table class="table table-zebra" id="examsTable">
              <thead>
                <tr>
                  <th>考试名称</th>
                  <th>受众</th>
                  <th>关联资料</th>
                  <th>题量</th>
                  <th>时长</th>
                  <th>及格线</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/js/mock-data.js"></script>
  <script src="../shared/js/data-store.js"></script>
  <script src="../shared/js/heroicons-replace.js"></script>
  <script src="js/admin-common.js"></script>
  <script>
    AdminCommon.init("exams.html");
    AdminCommon.setPageTitle("考试管理");

    const currentUser = DataStore.getCurrentUser();
    const scope = DataStore.getScopeAudience(currentUser);
    if (scope) {
      const af = document.getElementById("audienceFilter");
      if (af) af.style.display = "none";
    }

    function loadExams() {
      let list = DataStore.filterByScope(DataStore.getExams(), currentUser);
      const status = document.getElementById("statusFilter").value;
      const audience = document.getElementById("audienceFilter").value;
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
      if (status) list = list.filter(e => e.status === status);
      if (audience) {
        list = list.filter(e => {
          const aud = DataStore.normalizeAudience(e.audience);
          if (aud.mode === "role") return aud.role === audience;
          const learners = DataStore.getLearners().filter(u => u.role === audience);
          const userMatch = learners.some(u => aud.userIds.includes(u.id));
          const deptMatch = learners.some(u => u.department && aud.departments.includes(u.department));
          return userMatch || deptMatch;
        });
      }
      if (keyword) list = list.filter(e => e.title.toLowerCase().includes(keyword));

      const materials = DataStore.getMaterials();
      const tbody = document.querySelector("#examsTable tbody");
      if (!list.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="empty-state">暂无数据</td></tr>`;
        return;
      }

      const audienceBadge = (audience) => {
        const aud = DataStore.normalizeAudience(audience);
        if (aud.mode === "role") {
          const map = { agent: "代理商", employee: "内部员工", all: "全部" };
          const cls = { agent: "badge-info", employee: "badge-secondary", all: "badge-neutral" };
          return `<span class="badge ${cls[aud.role] || 'badge-neutral'}">${map[aud.role] || aud.role}</span>`;
        }
        const label = DataStore.formatAudienceLabel(aud);
        return `<span class="badge badge-primary" title="${label}">指定人员</span>`;
      };

      tbody.innerHTML = list.map(e => {
        const matNames = e.materialIds.map(id => {
          const m = materials.find(x => x.id === id);
          return m ? m.title : "-";
        }).join(", ");
        return `
          <tr>
            <td>${e.title}</td>
            <td>${audienceBadge(e.audience || "agent")}</td>
            <td>${matNames || "-"}</td>
            <td>${e.questionIds.length} 题</td>
            <td>${e.duration} 分钟</td>
            <td>${e.passScore} 分</td>
            <td><span class="badge ${e.status === "published" ? "badge-success status-published" : "badge-warning status-draft"}">${e.status === "published" ? "已发布" : "草稿"}</span></td>
            <td class="actions">
              <a href="exam-create.html?id=${e.id}" class="btn btn-sm btn-ghost">编辑</a>
              <button class="btn btn-sm btn-danger" onclick="deleteExam('${e.id}')">删除</button>
            </td>
          </tr>
        `;
      }).join("");
    }

    window.deleteExam = function(id) {
      if (!confirm("确定删除该考试吗？")) return;
      DataStore.deleteExam(id);
      AdminCommon.toast("删除成功");
      loadExams();
    };

    document.getElementById("statusFilter").addEventListener("change", loadExams);
    document.getElementById("audienceFilter").addEventListener("change", loadExams);
    document.getElementById("searchInput").addEventListener("input", loadExams);

    loadExams();
  </script>
</body>
</html>

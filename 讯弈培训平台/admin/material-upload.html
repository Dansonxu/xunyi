<!DOCTYPE html>
<html lang="zh-CN" data-theme="edutech">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传资料 - 代理商学习考核平台</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3B82F6',
            secondary: '#10B981',
            surface: '#F8FAFC',
            'primary-light': '#EBF4FF',
            'secondary-light': '#ECFDF5'
          },
          borderRadius: {
            '2xl': '12px'
          }
        }
      },
      daisyui: {
        themes: [{
          edutech: {
            primary: '#3B82F6',
            secondary: '#10B981',
            accent: '#3B82F6',
            neutral: '#1F2937',
            'base-100': '#F8FAFC',
            'base-200': '#F1F5F9',
            'base-300': '#E2E8F0',
            info: '#3B82F6',
            success: '#10B981',
            warning: '#F59E0B',
            error: '#EF4444'
          }
        }]
      }
    }
  </script>
  <link rel="stylesheet" href="../shared/css/common.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div class="admin-main">
      <div class="admin-content">
        <div class="admin-page-header">
          <h1 class="admin-page-title">上传资料</h1>
          <a href="materials.html" class="btn btn-ghost"><i class="fa-solid fa-arrow-left"></i>返回列表</a>
        </div>

        <div class="card">
          <div class="card-title">资料信息</div>
          <form id="materialForm">
            <input type="hidden" id="materialId">

            <div class="admin-form-section">
              <div class="admin-form-section-title"><i class="fa-solid fa-circle-info"></i>基础信息</div>
              <div class="form-group">
                <label class="form-label"><span class="required">资料标题</span></label>
                <input type="text" class="form-control" id="title" placeholder="请输入资料标题">
              </div>

              <div class="admin-form-grid">
                <div class="form-group">
                  <label class="form-label"><span class="required">资料类型</span></label>
                  <select class="form-control" id="type">
                    <option value="pdf">PDF</option>
                    <option value="word">Word</option>
                    <option value="video">视频</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label"><span class="required">资料分类</span></label>
                  <div class="flex items-center gap-12">
                    <select class="form-control" id="category"></select>
                    <a href="categories.html" class="text-sm" style="color: var(--primary); white-space: nowrap;">管理分类</a>
                  </div>
                  <div class="form-hint" id="categoryHint" style="display:none; color: var(--error);">请先前往"分类配置"添加资料分类</div>
                </div>
              </div>

              <div class="admin-form-grid">
                <div class="form-group">
                  <label class="form-label"><span class="required">适用受众</span></label>
                  <select class="form-control" id="audienceMode">
                    <option value="agent">代理商</option>
                    <option value="employee">内部员工</option>
                    <option value="all">全部</option>
                    <option value="specific">指定人员</option>
                  </select>
                  <div id="audienceSpecificWrap" style="display:none; margin-top: 10px;">
                    <button type="button" class="btn btn-outline btn-sm" id="pickAudienceBtn"><i class="fa-solid fa-user-group"></i>选择人员</button>
                    <div class="audience-field-summary" id="audienceSummary"></div>
                  </div>
                  <input type="hidden" id="audienceUserIds">
                  <input type="hidden" id="audienceDepartments">
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">资料简介</label>
                <textarea class="form-control" id="description" rows="3" placeholder="请输入资料简介，便于学员快速了解内容"></textarea>
              </div>
            </div>

            <div class="admin-form-section">
              <div class="admin-form-section-title"><i class="fa-solid fa-cloud-arrow-up"></i>文件上传</div>
              <input type="file" class="hidden" id="fileInput" accept=".pdf,.doc,.docx,.mp4,.mov">
              <div class="form-group">
                <label class="form-label"><span class="required">上传文件</span></label>
                <div class="admin-upload-zone" id="uploadZone">
                  <i class="fa-solid fa-cloud-arrow-up"></i>
                  <div class="admin-upload-zone-text">点击或拖拽文件到此处上传</div>
                  <div class="admin-upload-zone-hint">支持 PDF、Word、MP4 格式，单个文件不超过 500MB</div>
                </div>
                <div class="admin-upload-preview" id="filePreview" style="display: none;">
                  <i class="fa-solid fa-file" id="previewFileIcon"></i>
                  <div class="admin-upload-preview-info">
                    <div class="admin-upload-preview-name" id="previewFileName">-</div>
                    <div class="admin-upload-preview-size" id="previewFileSize">-</div>
                  </div>
                  <button type="button" class="admin-upload-remove" id="removeFileBtn" title="移除文件"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="form-hint">demo 中文件不会真正上传服务器，仅保存文件信息用于演示。</div>
              </div>

              <div class="form-group" id="uploadProgressWrap" style="display: none;">
                <label class="form-label">上传进度</label>
                <div class="admin-progress">
                  <div class="admin-progress-bar" id="uploadProgressBar" style="width: 0%;"></div>
                </div>
                <div id="uploadProgressText" class="form-hint mt-8">0%</div>
              </div>
            </div>

            <div class="admin-form-section">
              <div class="admin-form-section-title"><i class="fa-solid fa-gear"></i>发布设置</div>
              <div class="admin-form-grid">
                <div class="form-group">
                  <label class="form-label">发布状态</label>
                  <select class="form-control" id="status">
                    <option value="published">已发布</option>
                    <option value="draft">草稿</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="admin-form-actions">
              <a href="materials.html" class="btn btn-ghost">取消</a>
              <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i>保存</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/js/mock-data.js"></script>
  <script src="../shared/js/data-store.js"></script>
  <script src="../shared/js/audience-picker.js"></script>
  <script src="../shared/js/heroicons-replace.js"></script>
  <script src="js/admin-common.js"></script>
  <script>
    AdminCommon.init("materials.html");
    AdminCommon.setPageTitle("上传资料");

    const materialId = AdminCommon.getQueryParam("id");
    const currentUser = DataStore.getCurrentUser();
    const scope = DataStore.getScopeAudience(currentUser);
    let selectedFile = null;
    let isUploading = false;
    let currentAudience = { mode: "role", role: "agent", userIds: [], departments: [] };

    const audienceModeSel = document.getElementById("audienceMode");
    const audienceSpecificWrap = document.getElementById("audienceSpecificWrap");
    const pickAudienceBtn = document.getElementById("pickAudienceBtn");
    const audienceSummaryEl = document.getElementById("audienceSummary");

    function updateAudienceSummary() {
      if (currentAudience.mode !== "specific") {
        audienceSpecificWrap.style.display = "none";
        audienceSummaryEl.textContent = "";
        return;
      }
      audienceSpecificWrap.style.display = "block";
      const userCount = currentAudience.userIds.length;
      const deptCount = currentAudience.departments.length;
      if (!userCount && !deptCount) {
        audienceSummaryEl.textContent = "尚未选择人员或部门";
      } else {
        const parts = [];
        if (deptCount) parts.push(`${deptCount}个部门全选`);
        const learners = DataStore.getLearners();
        const individualCount = currentAudience.userIds.filter(id => {
          const u = learners.find(x => x.id === id);
          return u && !(u.department && currentAudience.departments.includes(u.department));
        }).length;
        if (individualCount) parts.push(`${individualCount}人单独选择`);
        audienceSummaryEl.textContent = `已选：${parts.join("、")}`;
      }
    }

    function openAudiencePicker() {
      const roleFilter = scope || null;
      AudiencePicker.open({
        roleFilter,
        selectedUserIds: currentAudience.userIds,
        selectedDepartments: currentAudience.departments,
        onConfirm: ({ userIds, departments }) => {
          currentAudience.userIds = userIds;
          currentAudience.departments = departments;
          updateAudienceSummary();
        }
      });
    }

    function setAudienceMode(mode) {
      audienceModeSel.value = mode;
      currentAudience.mode = mode;
      if (mode === "specific") {
        audienceSpecificWrap.style.display = "block";
      } else {
        audienceSpecificWrap.style.display = "none";
      }
      updateAudienceSummary();
    }

    audienceModeSel.addEventListener("change", () => {
      const mode = audienceModeSel.value;
      currentAudience.mode = mode;
      if (mode === "specific") {
        audienceSpecificWrap.style.display = "block";
        if (!currentAudience.userIds.length && !currentAudience.departments.length) {
          openAudiencePicker();
        }
      } else {
        audienceSpecificWrap.style.display = "none";
      }
      updateAudienceSummary();
    });

    pickAudienceBtn.addEventListener("click", openAudiencePicker);

    // Operators can only create content for their own type — lock the audience field.
    if (scope) {
      audienceModeSel.value = scope;
      audienceModeSel.disabled = true;
      Array.from(audienceModeSel.options).forEach(opt => {
        if (opt.value !== scope) opt.style.display = "none";
      });
      currentAudience = { mode: "role", role: scope, userIds: [], departments: [] };
    }

    if (materialId) {
      const m = DataStore.getMaterialById(materialId);
      if (m) {
        document.getElementById("materialId").value = m.id;
        document.getElementById("title").value = m.title;
        document.getElementById("type").value = m.type;
        currentAudience = DataStore.normalizeAudience(m.audience);
        setAudienceMode(currentAudience.mode);
        if (currentAudience.mode === "specific") {
          currentAudience.userIds = [...(currentAudience.userIds || [])];
          currentAudience.departments = [...(currentAudience.departments || [])];
        }
        document.getElementById("description").value = m.description;
        document.getElementById("status").value = m.status;
      }
    }

    updateAudienceSummary();

    function loadCategoryOptions() {
      const categories = DataStore.getMaterialCategories();
      const select = document.getElementById("category");
      const hint = document.getElementById("categoryHint");
      select.innerHTML = "";

      if (!categories.length) {
        select.disabled = true;
        hint.style.display = "block";
        return;
      }

      select.disabled = false;
      hint.style.display = "none";
      categories.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.name;
        opt.textContent = c.name;
        select.appendChild(opt);
      });

      if (materialId) {
        const m = DataStore.getMaterialById(materialId);
        if (m) select.value = m.category;
      }
    }

    loadCategoryOptions();

    const fileInput = document.getElementById("fileInput");
    const uploadZone = document.getElementById("uploadZone");
    const filePreview = document.getElementById("filePreview");

    uploadZone.addEventListener("click", () => fileInput.click());

    uploadZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      uploadZone.classList.add("dragover");
    });

    uploadZone.addEventListener("dragleave", () => {
      uploadZone.classList.remove("dragover");
    });

    uploadZone.addEventListener("drop", (e) => {
      e.preventDefault();
      uploadZone.classList.remove("dragover");
      if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        handleFileSelect(e.dataTransfer.files[0]);
      }
    });

    fileInput.addEventListener("change", function(e) {
      if (e.target.files.length) handleFileSelect(e.target.files[0]);
    });

    document.getElementById("removeFileBtn").addEventListener("click", function() {
      selectedFile = null;
      fileInput.value = "";
      uploadZone.style.display = "block";
      filePreview.style.display = "none";
    });

    function handleFileSelect(file) {
      selectedFile = file;
      uploadZone.style.display = "none";
      filePreview.style.display = "flex";
      document.getElementById("previewFileName").textContent = file.name;
      document.getElementById("previewFileSize").textContent = formatFileSize(file.size);
      const typeMap = { pdf: "fa-file-pdf", word: "fa-file-word", video: "fa-file-video" };
      const ext = file.name.split(".").pop().toLowerCase();
      let iconClass = "fa-file";
      if (["pdf"].includes(ext)) iconClass = typeMap.pdf;
      else if (["doc", "docx"].includes(ext)) iconClass = typeMap.word;
      else if (["mp4", "mov"].includes(ext)) iconClass = typeMap.video;
      document.getElementById("previewFileIcon").className = "fa-solid " + iconClass;
    }

    function simulateUpload(file, onProgress, onComplete) {
      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.random() * 20;
        if (progress >= 100) {
          progress = 100;
          clearInterval(interval);
          onComplete();
        } else {
          onProgress(Math.floor(progress));
        }
      }, 200);
    }

    document.getElementById("materialForm").addEventListener("submit", function(e) {
      e.preventDefault();
      if (isUploading) return;

      const title = document.getElementById("title").value.trim();
      const type = document.getElementById("type").value;
      const category = document.getElementById("category").value.trim();
      const description = document.getElementById("description").value.trim();
      const status = document.getElementById("status").value;

      let audience;
      if (scope) {
        audience = { mode: "role", role: scope, userIds: [], departments: [] };
      } else if (currentAudience.mode === "specific") {
        audience = {
          mode: "specific",
          role: null,
          userIds: currentAudience.userIds,
          departments: currentAudience.departments
        };
      } else {
        audience = { mode: "role", role: audienceModeSel.value, userIds: [], departments: [] };
      }

      if (!title) {
        AdminCommon.toast("请填写资料标题", "error");
        return;
      }

      if (!DataStore.getMaterialCategories().length) {
        AdminCommon.toast("请先前往分类配置添加资料分类", "error");
        return;
      }

      if (!category) {
        AdminCommon.toast("请选择资料分类", "error");
        return;
      }

      const existingId = document.getElementById("materialId").value;
      const existing = existingId ? DataStore.getMaterialById(existingId) : null;

      if (selectedFile) {
        isUploading = true;
        const wrap = document.getElementById("uploadProgressWrap");
        const bar = document.getElementById("uploadProgressBar");
        const text = document.getElementById("uploadProgressText");
        wrap.style.display = "block";

        simulateUpload(selectedFile, (p) => {
          bar.style.width = p + "%";
          text.textContent = p + "%";
        }, () => {
          const material = {
            title,
            type,
            category,
            audience,
            description,
            status,
            fileUrl: `../assets/demo-files/${selectedFile.name}`,
            fileSize: formatFileSize(selectedFile.size)
          };
          if (existing) {
            DataStore.updateMaterial(existing.id, material);
          } else {
            material.uploaderId = currentUser.id;
            DataStore.addMaterial(material);
          }
          AdminCommon.toast("保存成功");
          setTimeout(() => location.href = "materials.html", 800);
        });
      } else {
        if (existing) {
          DataStore.updateMaterial(existing.id, { title, type, category, audience, description, status });
        } else {
          AdminCommon.toast("请选择要上传的文件", "error");
          return;
        }
        AdminCommon.toast("保存成功");
        setTimeout(() => location.href = "materials.html", 500);
      }
    });

    function formatFileSize(bytes) {
      if (bytes === 0) return "0 B";
      const k = 1024;
      const sizes = ["B", "KB", "MB", "GB"];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + " " + sizes[i];
    }
  </script>
</body>
</html>

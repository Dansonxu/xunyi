<!DOCTYPE html>
<html lang="zh-CN" data-theme="edutech">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 - 讯弈培训平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3B82F6',
            secondary: '#10B981',
            surface: '#F8FAFC',
            'primary-light': '#EBF4FF',
            'secondary-light': '#ECFDF5'
          },
          borderRadius: {
            '2xl': '12px'
          }
        }
      },
      daisyui: {
        themes: [{
          edutech: {
            primary: '#3B82F6',
            secondary: '#10B981',
            accent: '#3B82F6',
            neutral: '#1F2937',
            'base-100': '#F8FAFC',
            'base-200': '#F1F5F9',
            'base-300': '#E2E8F0',
            info: '#3B82F6',
            success: '#10B981',
            warning: '#F59E0B',
            error: '#EF4444'
          }
        }]
      }
    }
  </script>
  <link rel="stylesheet" href="../shared/css/common.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="../shared/js/heroicons-replace.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center p-4">
  <div class="card w-full max-w-md bg-white rounded-2xl shadow-xl p-8 md:p-10">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/10 text-primary mb-4">
        <i class="fa-solid fa-graduation-cap text-3xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-slate-800">讯弈培训平台</h1>
      <p class="text-slate-500 mt-2">后台管理登录</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div class="form-control">
        <label class="label">
          <span class="label-text font-medium text-slate-700">账号</span>
        </label>
        <input type="text" id="username" placeholder="请输入管理员账号" value="admin" class="input input-bordered w-full rounded-xl focus:input-primary">
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text font-medium text-slate-700">密码</span>
        </label>
        <input type="password" id="password" placeholder="请输入密码" value="admin123" class="input input-bordered w-full rounded-xl focus:input-primary">
      </div>
      <button type="submit" class="btn btn-primary w-full rounded-xl shadow-md shadow-primary/30 hover:shadow-lg hover:shadow-primary/40 hover:-translate-y-0.5 transition-all duration-200">
        登录
      </button>
    </form>

    <p class="text-center text-xs text-slate-400 mt-6">演示账号：管理员 admin / 代理运营 opagent / 员工运营 opemp，密码同 admin123、123456</p>
  </div>

  <script src="../shared/js/mock-data.js"></script>
  <script src="../shared/js/data-store.js"></script>
  <script>
    DataStore.initMockData();
    const form = document.getElementById("loginForm");
    form.addEventListener("submit", function(e) {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const user = DataStore.getUserByUsername(username);
      if (!user || !user.isBackendUser || user.password !== password) {
        alert("账号或密码错误");
        return;
      }
      DataStore.setCurrentUser(user);
      location.href = "index.html";
    });
  </script>
</body>
</html>

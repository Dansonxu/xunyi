<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>围棋棋力自适应测评 Demo</title>
  <script src="data/questions.js"></script>
  <style>
    :root {
      --bg: #f5f5f0;
      --card: #ffffff;
      --primary: #8b4513;
      --primary-light: #d2b48c;
      --success: #2e7d32;
      --danger: #c62828;
      --text: #333333;
      --muted: #666666;
      --border: #e0e0e0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    header {
      text-align: center;
      margin-bottom: 24px;
    }
    header h1 {
      margin: 0 0 8px;
      font-size: 24px;
      color: var(--primary);
    }
    header p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 24px;
      margin-bottom: 16px;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
    }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .option {
      display: block;
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fafafa;
      cursor: pointer;
      transition: all 0.15s;
    }
    .option:hover { background: #f0f0f0; border-color: var(--primary-light); }
    .option.correct { background: #e8f5e9; border-color: var(--success); }
    .option.wrong { background: #ffebee; border-color: var(--danger); }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 14px;
      color: var(--muted);
    }
    .level-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600;
    }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar > div {
      height: 100%;
      background: var(--primary);
      transition: width 0.3s;
    }
    .question-text {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 20px;
    }
    .board-placeholder {
      background: #f9f6f1;
      border: 2px dashed var(--primary-light);
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .go-board {
      background: #dcb35c;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      margin: 0 auto 8px;
      display: block;
      max-width: 100%;
      height: auto;
      cursor: crosshair;
      touch-action: none;
    }
    .go-board.interactive .intersection {
      cursor: pointer;
    }
    .go-board .intersection:hover circle {
      fill: rgba(0,0,0,0.15);
    }
    .board-actions {
      text-align: center;
      margin-bottom: 16px;
    }
    .board-actions .btn {
      margin: 0 4px;
    }
    .user-move-hint {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
    }
    .board-moves {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 16px;
    }
    .feedback {
      padding: 12px 16px;
      border-radius: 8px;
      margin-top: 16px;
      font-size: 14px;
    }
    .feedback.correct { background: #e8f5e9; color: var(--success); }
    .feedback.wrong { background: #ffebee; color: var(--danger); }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .stat-box {
      background: #fafafa;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .stat-box .label { font-size: 12px; color: var(--muted); }
    .stat-box .value { font-size: 20px; font-weight: 700; color: var(--primary); }
    .result-level {
      text-align: center;
      padding: 32px;
    }
    .result-level .big {
      font-size: 48px;
      font-weight: 800;
      color: var(--primary);
    }
    .result-level .desc {
      color: var(--muted);
      margin-top: 8px;
    }
    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 16px;
    }
    .history-table th, .history-table td {
      border: 1px solid var(--border);
      padding: 8px;
      text-align: center;
    }
    .history-table th { background: #fafafa; }
    .hidden { display: none; }
    .sim-panel {
      background: #fffbe6;
      border: 1px solid #ffe58f;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .sim-panel label {
      font-size: 14px;
      margin-right: 8px;
    }
    .sim-panel select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>围棋棋力自适应测评</h1>
      <p>根据答题表现动态调整题目难度，快速定位真实棋力</p>
    </header>

    <!-- 开始界面 -->
    <div id="start-screen" class="card">
      <h2>测评说明</h2>
      <ul>
        <li>题库共 600 题，覆盖 20级 → 5级</li>
        <li>默认从 <strong>12级</strong> 开始</li>
        <li>连续答对 <strong>3</strong> 题升级，连续答错 2 题降级</li>
        <li>至少做 12 题，达到收敛条件后提前结束</li>
      </ul>

      <button class="btn btn-primary" onclick="startQuiz()">开始测评</button>
    </div>

    <!-- 测评界面 -->
    <div id="quiz-screen" class="hidden">
      <div class="card">
        <div class="meta">
          <span>第 <strong id="q-index">1</strong> 题</span>
          <span class="level-badge" id="current-level">12级</span>
          <span>最大 <strong>40</strong> 题</span>
        </div>
        <div class="progress-bar"><div id="progress" style="width:0%"></div></div>
        <div id="question-container"></div>
        <div id="feedback" class="feedback hidden"></div>
      </div>

      <div class="card">
        <h3>当前各级别统计</h3>
        <div class="stats-grid" id="level-stats"></div>
      </div>
    </div>

    <!-- 结果界面 -->
    <div id="result-screen" class="hidden">
      <div class="card result-level">
        <div class="big" id="result-level">--</div>
        <div class="desc">推荐棋力等级</div>
      </div>
      <div class="card">
        <h3>测评统计</h3>
        <div class="stats-grid" id="result-stats"></div>
        <h3 style="margin-top:24px;">答题轨迹</h3>
        <div style="overflow-x:auto;">
          <table class="history-table">
            <thead>
              <tr><th>题号</th><th>级别</th><th>题型</th><th>结果</th><th>当前连续</th></tr>
            </thead>
            <tbody id="history-body"></tbody>
          </table>
        </div>
        <button class="btn btn-primary" style="margin-top:20px;" onclick="resetQuiz()">重新测评</button>
      </div>
    </div>
  </div>

  <script>
    const LEVELS = ['20级', '15级', '12级', '10级', '7级', '5级'];
    const QUESTIONS = window.QUESTIONS || [];

    // 按级别分组
    const bankByLevel = {};
    LEVELS.forEach(lv => bankByLevel[lv] = []);
    QUESTIONS.forEach(q => {
      if (bankByLevel[q.level]) bankByLevel[q.level].push(q);
    });

    let state = null;

    function initState() {
      return {
        currentLevel: '12级',
        levelStats: Object.fromEntries(LEVELS.map(lv => [lv, { 对: 0, 错: 0, 总: 0 }])),
        consecutive: 0,
        usedIds: new Set(),
        history: [],
        step: 0,
        finished: false,
      };
    }

    function startQuiz() {
      state = initState();
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');

      nextQuestion();
    }

    function resetQuiz() {
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('start-screen').classList.remove('hidden');
    }

    function pickQuestion(level) {
      const pool = bankByLevel[level].filter(q => !state.usedIds.has(q.id));
      if (pool.length === 0) {
        // 该级别已用完，从全部中随机（demo 兜底）
        const full = bankByLevel[level];
        return full[Math.floor(Math.random() * full.length)];
      }
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function nextQuestion() {
      if (state.finished) return;

      const q = pickQuestion(state.currentLevel);
      state.usedIds.add(q.id);
      state.currentQuestion = q;
      state.step += 1;

      renderQuestion(q);
      renderStats();
    }

    function parseAnswerMoves(answer) {
      if (!answer) return [];
      const moves = [];
      // 匹配如：黑1 E2、白2 E6、黑3 F5
      const regex = /([黑白])(\d+)\s+([A-Za-z])(\d+)/g;
      let m;
      while ((m = regex.exec(answer)) !== null) {
        moves.push({
          color: m[1] === '黑' ? 'black' : 'white',
          number: parseInt(m[2], 10),
          col: m[3].toUpperCase(),
          row: parseInt(m[4], 10),
        });
      }
      return moves;
    }

    function coordToIndex(col, row, size) {
      // A=0, B=1, ...（不跳 I，按顺序映射）
      const x = col.charCodeAt(0) - 'A'.charCodeAt(0);
      // 棋盘上数字 1 在最下方，SVG 中 y=0 在最上方
      const y = size - row;
      return { x, y };
    }

    function renderBoardSVG(size, moves) {
      const cell = 28;
      const margin = 20;
      const width = (size - 1) * cell + margin * 2;
      const height = width;

      let svg = `<svg class="go-board" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">`;
      svg += `<rect width="${width}" height="${height}" fill="#dcb35c" rx="6"/>`;

      // 网格线
      for (let i = 0; i < size; i++) {
        const pos = margin + i * cell;
        svg += `<line x1="${pos}" y1="${margin}" x2="${pos}" y2="${height - margin}" stroke="#333" stroke-width="1"/>`;
        svg += `<line x1="${margin}" y1="${pos}" x2="${width - margin}" y2="${pos}" stroke="#333" stroke-width="1"/>`;
      }

      // 星位（仅 9/13/19 路）
      const stars = {
        9: [[2, 2], [2, 6], [6, 2], [6, 6], [4, 4]],
        13: [[3, 3], [3, 9], [9, 3], [9, 9], [6, 6]],
        19: [[3, 3], [3, 9], [3, 15], [9, 3], [9, 9], [9, 15], [15, 3], [15, 9], [15, 15]],
      };
      (stars[size] || []).forEach(([sx, sy]) => {
        const cx = margin + sx * cell;
        const cy = margin + sy * cell;
        svg += `<circle cx="${cx}" cy="${cy}" r="3" fill="#333"/>`;
      });

      // 坐标标签
      for (let i = 0; i < size; i++) {
        const pos = margin + i * cell;
        const label = String.fromCharCode('A'.charCodeAt(0) + i);
        svg += `<text x="${pos}" y="${margin - 8}" text-anchor="middle" font-size="10" fill="#555">${label}</text>`;
        svg += `<text x="${margin - 8}" y="${pos + 4}" text-anchor="end" font-size="10" fill="#555">${size - i}</text>`;
      }

      // 落子
      moves.forEach(mv => {
        const idx = coordToIndex(mv.col, mv.row, size);
        if (idx.x < 0 || idx.x >= size || idx.y < 0 || idx.y >= size) return;
        const cx = margin + idx.x * cell;
        const cy = margin + idx.y * cell;
        const r = cell * 0.42;
        const color = mv.color === 'black' ? '#111' : '#f5f5f5';
        const stroke = mv.color === 'black' ? '#111' : '#999';
        svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" stroke="${stroke}" stroke-width="1"/>`;
        const textColor = mv.color === 'black' ? '#fff' : '#111';
        svg += `<text x="${cx}" y="${cy + 4}" text-anchor="middle" font-size="${cell * 0.45}" fill="${textColor}" font-weight="bold">${mv.number}</text>`;
      });

      svg += '</svg>';
      return svg;
    }

    function parseInitialStones(initialStones) {
      // 格式："黑:A1,B2;白:C3,D4"
      const result = { black: [], white: [] };
      if (!initialStones) return result;
      const parts = initialStones.split(';');
      parts.forEach(part => {
        const match = part.match(/^([黑白])[:：]\s*(.+)$/);
        if (!match) return;
        const color = match[1] === '黑' ? 'black' : 'white';
        const coords = match[2].split(/[,，\s]+/).filter(c => /^[A-Za-z]\d+$/.test(c));
        coords.forEach(c => {
          result[color].push({
            col: c.charAt(0).toUpperCase(),
            row: parseInt(c.slice(1), 10),
          });
        });
      });
      return result;
    }

    function getFirstMove(answer) {
      const moves = parseAnswerMoves(answer);
      return moves[0] || null;
    }

    function renderStone(svg, mv, size, options = {}) {
      const cell = 28;
      const margin = 20;
      const idx = coordToIndex(mv.col, mv.row, size);
      if (idx.x < 0 || idx.x >= size || idx.y < 0 || idx.y >= size) return;
      const cx = margin + idx.x * cell;
      const cy = margin + idx.y * cell;
      const r = cell * 0.42;
      const color = mv.color === 'black' ? '#111' : '#f5f5f5';
      const stroke = mv.color === 'black' ? '#111' : '#999';
      svg.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" stroke="${stroke}" stroke-width="1"/>`);
      if (options.number) {
        const textColor = mv.color === 'black' ? '#fff' : '#111';
        svg.push(`<text x="${cx}" y="${cy + 4}" text-anchor="middle" font-size="${cell * 0.45}" fill="${textColor}" font-weight="bold">${options.number}</text>`);
      }
      if (options.marker) {
        svg.push(`<circle cx="${cx}" cy="${cy}" r="${r + 4}" fill="none" stroke="${options.markerColor || '#c62828'}" stroke-width="2"/>`);
      }
    }

    function renderInteractiveBoard(q) {
      const gp = q.gridParams;
      const hasImage = !!q.boardImage && !!gp;

      if (hasImage) {
        // 使用原题棋盘图片作为背景，在交叉点上覆盖透明点击区
        const size = gp.gridSize;
        const w = gp.imageWidth;
        const h = gp.imageHeight;
        const hit = Math.min(gp.cellX, gp.cellY) * 0.8;

        let svg = [`<svg id="interactive-board" class="go-board interactive" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">`];
        svg.push(`<image href="${q.boardImage}" width="${w}" height="${h}" preserveAspectRatio="none"/>`);

        for (let x = 0; x < size; x++) {
          for (let y = 0; y < size; y++) {
            const cx = gp.x0 + x * gp.cellX;
            const cy = gp.y0 + y * gp.cellY;
            svg.push(`<g class="intersection" onclick="handleBoardClick(${x}, ${y})">`);
            svg.push(`  <rect x="${cx - hit/2}" y="${cy - hit/2}" width="${hit}" height="${hit}" fill="transparent"/>`);
            svg.push(`</g>`);
          }
        }

        svg.push('</svg>');
        return svg.join('\n');
      }

      // 无原图时 fallback：生成空棋盘
      const size = q.boardSize || 9;
      const cell = 28;
      const margin = 20;
      const width = (size - 1) * cell + margin * 2;
      const height = width;
      const initialStones = parseInitialStones(q.initialStones);

      let svg = [`<svg id="interactive-board" class="go-board interactive" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">`];
      svg.push(`<rect width="${width}" height="${height}" fill="#dcb35c" rx="6"/>`);

      for (let i = 0; i < size; i++) {
        const pos = margin + i * cell;
        svg.push(`<line x1="${pos}" y1="${margin}" x2="${pos}" y2="${height - margin}" stroke="#333" stroke-width="1"/>`);
        svg.push(`<line x1="${margin}" y1="${pos}" x2="${width - margin}" y2="${pos}" stroke="#333" stroke-width="1"/>`);
      }

      const stars = {
        9: [[2, 2], [2, 6], [6, 2], [6, 6], [4, 4]],
        13: [[3, 3], [3, 9], [9, 3], [9, 9], [6, 6]],
        19: [[3, 3], [3, 9], [3, 15], [9, 3], [9, 9], [9, 15], [15, 3], [15, 9], [15, 15]],
      };
      (stars[size] || []).forEach(([sx, sy]) => {
        const cx = margin + sx * cell;
        const cy = margin + sy * cell;
        svg.push(`<circle cx="${cx}" cy="${cy}" r="3" fill="#333"/>`);
      });

      for (let i = 0; i < size; i++) {
        const pos = margin + i * cell;
        const label = String.fromCharCode('A'.charCodeAt(0) + i);
        svg.push(`<text x="${pos}" y="${margin - 8}" text-anchor="middle" font-size="10" fill="#555">${label}</text>`);
        svg.push(`<text x="${margin - 8}" y="${pos + 4}" text-anchor="end" font-size="10" fill="#555">${size - i}</text>`);
      }

      initialStones.black.forEach(s => renderStone(svg, { ...s, color: 'black' }, size));
      initialStones.white.forEach(s => renderStone(svg, { ...s, color: 'white' }, size));

      for (let x = 0; x < size; x++) {
        for (let y = 0; y < size; y++) {
          const cx = margin + x * cell;
          const cy = margin + y * cell;
          svg.push(`<g class="intersection" onclick="handleBoardClick(${x}, ${y})">`);
          svg.push(`  <rect x="${cx - cell/2}" y="${cy - cell/2}" width="${cell}" height="${cell}" fill="transparent"/>`);
          svg.push(`</g>`);
        }
      }

      svg.push('</svg>');
      return svg.join('\n');
    }

    function handleBoardClick(x, y) {
      if (!state || state.finished || !state.currentQuestion) return;
      const q = state.currentQuestion;
      if (q.type !== '实操题') return;

      const gp = q.gridParams;
      const size = gp ? gp.gridSize : (q.boardSize || 9);

      // 检查是否被初始局面占用
      const initial = parseInitialStones(q.initialStones);
      const occupied = [
        ...initial.black.map(s => coordToIndex(s.col, s.row, size)),
        ...initial.white.map(s => coordToIndex(s.col, s.row, size)),
      ];
      if (occupied.some(p => p.x === x && p.y === y)) return;

      state.userMove = { x, y };
      refreshInteractiveBoard();
    }

    function refreshInteractiveBoard() {
      const q = state.currentQuestion;
      const container = document.getElementById('question-container');
      const boardWrap = container.querySelector('.interactive-board-wrap');
      if (!boardWrap) return;

      // 重新渲染 SVG
      boardWrap.querySelector('.go-board').outerHTML = renderInteractiveBoard(q);

      // 绘制用户落子
      if (state.userMove) {
        const svg = document.getElementById('interactive-board');
        const gp = q.gridParams;
        let cx, cy, r;
        if (gp && q.boardImage) {
          cx = gp.x0 + state.userMove.x * gp.cellX;
          cy = gp.y0 + state.userMove.y * gp.cellY;
          r = Math.min(gp.cellX, gp.cellY) * 0.42;
        } else {
          const cell = 28;
          const margin = 20;
          cx = margin + state.userMove.x * cell;
          cy = margin + state.userMove.y * cell;
          r = cell * 0.42;
        }
        svg.innerHTML += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#111" stroke="#111" stroke-width="1"/>`;
        svg.innerHTML += `<text x="${cx}" y="${cy + 4}" text-anchor="middle" font-size="${r * 1.1}" fill="#fff" font-weight="bold">?</text>`;
      }
    }

    function resetUserMove() {
      state.userMove = null;
      refreshInteractiveBoard();
    }

    function submitPracticalMove() {
      if (!state.userMove) {
        alert('请先点击棋盘落子');
        return;
      }
      const q = state.currentQuestion;
      const gp = q.gridParams;
      const size = gp ? gp.gridSize : (q.boardSize || 9);
      const first = getFirstMove(q.answer);
      if (!first) {
        // 没有可解析的答案，按正确算（兜底）
        submitPractical(true);
        return;
      }
      const target = coordToIndex(first.col, first.row, size);
      const isCorrect = state.userMove.x === target.x && state.userMove.y === target.y;
      submitPractical(isCorrect);
    }

    function renderQuestion(q) {
      document.getElementById('q-index').textContent = state.step;
      document.getElementById('current-level').textContent = state.currentLevel;
      document.getElementById('progress').style.width = Math.min(100, (state.step / 40) * 100) + '%';
      document.getElementById('feedback').classList.add('hidden');

      const container = document.getElementById('question-container');
      container.innerHTML = '';

      const typeBadge = q.type === '实操题'
        ? '<span style="color:#c62828;font-weight:600;">【实操题】</span>'
        : '<span style="color:#2e7d32;font-weight:600;">【选择题】</span>';

      const tagText = q.tag ? `<span style="color:#666;">(${q.tag})</span>` : '';

      const questionDiv = document.createElement('div');
      questionDiv.className = 'question-text';
      questionDiv.innerHTML = `${typeBadge} ${tagText}<br>${q.question}`;
      container.appendChild(questionDiv);

      // 渲染棋盘：纯文字题不显示；实操题显示可点击交互棋盘；选择题显示空棋盘
      if (!q.board || q.board !== '(纯文字题,无棋盘)') {
        if (q.type === '实操题') {
          state.userMove = null;

          const hasImage = !!q.boardImage && !!q.gridParams;
          const hasImageGrid = !!q.boardImage && !!q.gridParams;
          const hasInitial = q.initialStones && (q.initialStones.includes('黑:') || q.initialStones.includes('白:'));
          if (!hasImageGrid && !hasInitial) {
            const notice = document.createElement('div');
            notice.className = 'user-move-hint';
            notice.style.color = '#c62828';
            notice.textContent = '本题暂未提供初始局面，请在空棋盘落子作答';
            container.appendChild(notice);
          }

          // 有原图但未能识别网格时，仍显示原图作为参考
          if (q.boardImage && !q.gridParams) {
            const img = document.createElement('img');
            img.src = q.boardImage;
            img.style.maxWidth = '100%';
            img.style.borderRadius = '8px';
            img.style.marginBottom = '12px';
            img.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)';
            container.appendChild(img);
          }

          const boardWrap = document.createElement('div');
          boardWrap.className = 'interactive-board-wrap';
          boardWrap.innerHTML = renderInteractiveBoard(q);
          container.appendChild(boardWrap);

          const hint = document.createElement('div');
          hint.className = 'user-move-hint';
          hint.textContent = '请在棋盘上点击落子，然后点击“确认落子”';
          container.appendChild(hint);

          const actionsDiv = document.createElement('div');
          actionsDiv.className = 'board-actions';
          actionsDiv.innerHTML = `
            <button class="btn btn-outline" onclick="resetUserMove()">重置</button>
            <button class="btn btn-success" onclick="submitPracticalMove()">确认落子</button>
          `;
          container.appendChild(actionsDiv);
        } else {
          // 选择题：优先显示原题棋盘图，否则显示空棋盘
          if (q.boardImage) {
            const img = document.createElement('img');
            img.src = q.boardImage;
            img.style.maxWidth = '100%';
            img.style.borderRadius = '8px';
            img.style.marginBottom = '16px';
            img.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)';
            container.appendChild(img);
          } else {
            const boardDiv = document.createElement('div');
            boardDiv.innerHTML = renderBoardSVG(q.boardSize, []);
            container.appendChild(boardDiv);
          }
        }
      }

      if (q.type === '选择题' && q.options.length) {
        q.options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'option';
          btn.textContent = `${opt.key}. ${opt.text}`;
          btn.onclick = () => submitAnswer(opt.key);
          container.appendChild(btn);
        });
      }
    }

    function submitAnswer(selectedKey) {
      const q = state.currentQuestion;
      const correctKey = q.answer ? q.answer.charAt(0).toUpperCase() : '';
      const isCorrect = selectedKey === correctKey;
      recordAnswer(isCorrect);
      showOptionFeedback(isCorrect, correctKey, selectedKey);
    }

    function submitPractical(isCorrect) {
      recordAnswer(isCorrect);
      const q = state.currentQuestion;

      // 在棋盘上显示正确答案手顺
      const container = document.getElementById('question-container');
      const boardWrap = container.querySelector('.interactive-board-wrap');
      if (boardWrap && q.type === '实操题') {
        const first = getFirstMove(q.answer);
        if (q.boardImage && q.gridParams && first) {
          // 在图片背景棋盘上标出正确答案位置
          const svg = document.getElementById('interactive-board');
          const gp = q.gridParams;
          const target = coordToIndex(first.col, first.row, gp.gridSize);
          const cx = gp.x0 + target.x * gp.cellX;
          const cy = gp.y0 + target.y * gp.cellY;
          const r = Math.min(gp.cellX, gp.cellY) * 0.45;
          svg.innerHTML += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#c62828" stroke-width="3"/>`;
          svg.innerHTML += `<text x="${cx}" y="${cy - r - 5}" text-anchor="middle" font-size="${r}" fill="#c62828" font-weight="bold">正解</text>`;
        } else {
          boardWrap.innerHTML = renderBoardSVG(q.boardSize, parseAnswerMoves(q.answer));
        }
        const movesDiv = document.createElement('div');
        movesDiv.className = 'board-moves';
        movesDiv.textContent = '正确答案：' + q.answer;
        boardWrap.appendChild(movesDiv);
      }

      const fb = document.getElementById('feedback');
      fb.classList.remove('hidden', 'correct', 'wrong');
      fb.classList.add(isCorrect ? 'correct' : 'wrong');
      fb.innerHTML = isCorrect
        ? '✅ 回答正确'
        : '❌ 回答错误。正确答案：' + (q.answer || '见解析');

      setTimeout(() => {
        if (!state.finished) nextQuestion();
      }, 1800);
    }

    function showOptionFeedback(isCorrect, correctKey, selectedKey) {
      const options = document.querySelectorAll('.option');
      options.forEach(btn => {
        const key = btn.textContent.charAt(0);
        btn.disabled = true;
        btn.classList.remove('correct', 'wrong');
        if (key === correctKey) btn.classList.add('correct');
        else if (key === selectedKey) btn.classList.add('wrong');
      });

      const fb = document.getElementById('feedback');
      fb.classList.remove('hidden', 'correct', 'wrong');
      fb.classList.add(isCorrect ? 'correct' : 'wrong');
      fb.innerHTML = isCorrect
        ? '✅ 回答正确'
        : `❌ 回答错误，正确答案是 <strong>${correctKey}</strong>`;

      setTimeout(() => {
        if (!state.finished) nextQuestion();
      }, 1200);
    }

    function recordAnswer(isCorrect) {
      const q = state.currentQuestion;
      const lv = state.currentLevel;

      state.levelStats[lv][isCorrect ? '对' : '错'] += 1;
      state.levelStats[lv].总 += 1;

      if (isCorrect) {
        state.consecutive = Math.max(state.consecutive, 0) + 1;
      } else {
        state.consecutive = Math.min(state.consecutive, 0) - 1;
      }

      const oldLevel = state.currentLevel;

      // 升降级判断：升级需要连续 3 题正确，降级只需连续 2 题错误
      if (state.consecutive >= 3 && state.currentLevel !== LEVELS[LEVELS.length - 1]) {
        state.currentLevel = LEVELS[LEVELS.indexOf(state.currentLevel) + 1];
        state.consecutive = 0;
      } else if (state.consecutive <= -2 && state.currentLevel !== LEVELS[0]) {
        state.currentLevel = LEVELS[LEVELS.indexOf(state.currentLevel) - 1];
        state.consecutive = 0;
      }

      state.history.push({
        step: state.step,
        level: oldLevel,
        type: q.type,
        result: isCorrect ? '对' : '错',
        consecutive: state.consecutive,
      });

      // 收敛判定（至少 12 题）
      if (state.step >= 12) {
        const stable = findStableLevel(state.levelStats);
        if (stable) {
          finishQuiz(stable);
          return;
        }
      }

      // 最大题数兜底
      if (state.step >= 40) {
        const stable = findStableLevel(state.levelStats) || estimateFallback();
        finishQuiz(stable);
      }
    }

    function findStableLevel(stats) {
      for (let i = LEVELS.length - 1; i >= 0; i--) {
        const lv = LEVELS[i];
        const s = stats[lv];
        if (s.总 === 0) continue;
        if (s.对 < 3 || s.对 / s.总 < 0.6) continue;

        if (lv === LEVELS[LEVELS.length - 1]) return lv;

        const higher = LEVELS[i + 1];
        if (stats[higher].总 >= 2 && stats[higher].错 >= 2) return lv;
      }

      // 最弱级兜底
      const s20 = stats['20级'];
      if (s20.总 >= 5 && s20.对 / s20.总 >= 0.6) {
        const anyHigherGood = LEVELS.slice(1).some(l => stats[l].总 >= 3 && stats[l].对 / stats[l].总 >= 0.6);
        if (!anyHigherGood) return '20级';
      }
      return null;
    }

    function estimateFallback() {
      // 跑满题数仍未收敛，返回正确率最高且总题数≥3 的级别
      let best = LEVELS[0];
      let bestRate = -1;
      LEVELS.forEach(lv => {
        const s = state.levelStats[lv];
        if (s.总 >= 3) {
          const rate = s.对 / s.总;
          if (rate >= bestRate) {
            bestRate = rate;
            best = lv;
          }
        }
      });
      return best;
    }

    function renderStats() {
      const grid = document.getElementById('level-stats');
      grid.innerHTML = '';
      LEVELS.forEach(lv => {
        const s = state.levelStats[lv];
        const rate = s.总 > 0 ? Math.round((s.对 / s.总) * 100) + '%' : '-';
        const active = lv === state.currentLevel ? 'style="border-color:var(--primary);background:#fff8ef;"' : '';
        grid.innerHTML += `
          <div class="stat-box" ${active}>
            <div class="label">${lv}</div>
            <div class="value">${s.对}/${s.总}</div>
            <div class="label">正确率 ${rate}</div>
          </div>
        `;
      });
    }

    function finishQuiz(stableLevel) {
      state.finished = true;
      document.getElementById('quiz-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');
      document.getElementById('result-level').textContent = stableLevel;

      const grid = document.getElementById('result-stats');
      grid.innerHTML = '';
      LEVELS.forEach(lv => {
        const s = state.levelStats[lv];
        if (s.总 === 0) return;
        const rate = Math.round((s.对 / s.总) * 100) + '%';
        grid.innerHTML += `
          <div class="stat-box">
            <div class="label">${lv}</div>
            <div class="value">${s.对}/${s.总}</div>
            <div class="label">正确率 ${rate}</div>
          </div>
        `;
      });
      grid.innerHTML += `
        <div class="stat-box">
          <div class="label">总题数</div>
          <div class="value">${state.step}</div>
          <div class="label">共作答</div>
        </div>
      `;

      const tbody = document.getElementById('history-body');
      tbody.innerHTML = state.history.map(h => `
        <tr>
          <td>${h.step}</td>
          <td>${h.level}</td>
          <td>${h.type}</td>
          <td style="color:${h.result==='对'?'var(--success)':'var(--danger)'}">${h.result}</td>
          <td>${h.consecutive}</td>
        </tr>
      `).join('');
    }
  </script>
</body>
</html>
